services:
  postgres:
    image: postgres:16-alpine
    container_name: vicky-postgres
    environment:
      POSTGRES_USER: vicky
      POSTGRES_PASSWORD: vicky_dev
      POSTGRES_DB: vicky
    ports:
      - "5433:5432"
    volumes:
      - vicky_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vicky -d vicky"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  vicky_pgdata:
