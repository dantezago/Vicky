<!doctype html>
<html lang="pt-BR" class="h-full bg-slate-50">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  {# Força tema claro nos controles nativos (selects, pickers) — sem isso,
     iOS/Android em dark mode renderizam o popup de <select> com texto cinza
     escuro sobre fundo escuro, deixando as opções praticamente ilegíveis. #}
  <meta name="color-scheme" content="light" />
  <meta name="supported-color-schemes" content="light" />
  <title>{% block title %}{{ app_name }}{% endblock %}</title>
  {# Favicon: quadradinho rosa com "V" branca, mesmo logo da sidebar #}
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ec4899'/%3E%3Cstop offset='100%25' stop-color='%23be185d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Bricolage Grotesque, sans-serif' font-size='38' font-weight='800' fill='white'%3EV%3C/text%3E%3C/svg%3E">
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23ec4899'/%3E%3Cstop offset='100%25' stop-color='%23be185d'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='64' height='64' rx='14' fill='url(%23g)'/%3E%3Ctext x='32' y='44' text-anchor='middle' font-family='Bricolage Grotesque, sans-serif' font-size='38' font-weight='800' fill='white'%3EV%3C/text%3E%3C/svg%3E">
  <script src="https://cdn.tailwindcss.com?plugins=forms,typography"></script>
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <!-- Mesma família tipográfica da landing: Bricolage Grotesque (display,
       geométrica e moderna), DM Sans (corpo, refinada), DM Mono (microcopy). -->

  <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@500;600;700;800&family=DM+Sans:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/app.css?v=20260426f">
  <script>
    tailwind.config = {
      theme: { extend: {
        fontFamily: {
          sans: ['"DM Sans"', 'ui-sans-serif', 'system-ui'],
          display: ['Bricolage Grotesque', '"DM Sans"', 'ui-sans-serif', 'system-ui'],
          mono: ['"DM Mono"', '"JetBrains Mono"', 'ui-monospace', 'monospace'],
        },
        colors: {
          brand: {
            50:  '#fdf2f8', 100: '#fce7f3', 200: '#fbcfe8', 300: '#f9a8d4',
            400: '#f472b6', 500: '#ec4899', 600: '#db2777', 700: '#be185d',
            800: '#9d174d', 900: '#831843',
          },
          ink: { DEFAULT: '#0a0414', 50: '#1a0e26', 100: '#150a1f' },
        },
        boxShadow: {
          card: '0 1px 3px 0 rgb(15 23 42 / 0.06), 0 1px 2px -1px rgb(15 23 42 / 0.04)',
          'card-lg': '0 14px 36px -12px rgba(15,23,42,0.12)',
          'brand-sm': '0 6px 16px -4px rgba(236,72,153,0.28)',
          'brand-md': '0 10px 28px -8px rgba(236,72,153,0.36)',
          'brand-lg': '0 18px 40px -12px rgba(236,72,153,0.42)',
        },
        letterSpacing: {
          tightest: '-0.035em',
          tighter: '-0.02em',
        },
      }}
    }
  </script>
</head>
<body class="h-full font-sans text-slate-800 antialiased">
{% block body %}{% endblock %}
<script>
  // Auto-seleciona o conteúdo de inputs pré-preenchidos quando recebem foco —
  // evita a fricção de ter que apagar o valor antigo antes de digitar o novo.
  document.addEventListener('focusin', function(ev) {
    var t = ev.target;
    if (!t || !t.tagName) return;
    if (t.tagName !== 'INPUT' && t.tagName !== 'TEXTAREA') return;
    var type = (t.type || '').toLowerCase();
    var selectable = ['text', 'number', 'search', 'email', 'url', 'tel', 'password', ''];
    if (t.tagName === 'INPUT' && selectable.indexOf(type) === -1) return;
    if (t.readOnly || t.disabled) return;
    if (!t.value) return;
    setTimeout(function() { try { t.select(); } catch(_){} }, 0);
  });

  // ── Toggle de favoritos via fetch (preserva scroll/posição) ─────────────
  // Aplica-se a qualquer <form data-fav-form> com botão contendo dois SVGs:
  //   data-fav-on  (estrela preenchida) e data-fav-off (contorno).
  // Previne o foco ao clicar no botão. Sem isso, o `scroll-behavior: smooth`
  // global dispara um scroll-into-view animado que rola a página inteira.
  document.addEventListener('mousedown', function(ev) {
    if (ev.target.closest && ev.target.closest('form[data-fav-form] button')) {
      ev.preventDefault();
    }
  }, true);

  document.addEventListener('submit', function(ev) {
    var form = ev.target.closest('form[data-fav-form]');
    if (!form) return;
    ev.preventDefault();
    var btn = form.querySelector('button[type=submit]');
    if (!btn) return;
    var iconOn  = btn.querySelector('[data-fav-on]');
    var iconOff = btn.querySelector('[data-fav-off]');
    var fd = new FormData(form);
    btn.disabled = true;
    // Preserva scroll (alguns browsers movem viewport ao focar o botão).
    var sx = window.scrollX, sy = window.scrollY;
    // Atenção: usar getAttribute('action') porque um input name="action"
    // dentro do form sombrearia HTMLFormElement.action e devolveria o nó.
    var url = form.getAttribute('action');
    fetch(url, {
      method: 'POST',
      body: fd,
      headers: {'X-Requested-With': 'fetch'},
      credentials: 'same-origin',
    }).then(function(r) { return r.ok ? r.json() : Promise.reject(r); })
      .then(function(data) {
        var on = data && data.state === 'on';
        if (iconOn)  iconOn.classList.toggle('hidden', !on);
        if (iconOff) iconOff.classList.toggle('hidden', on);
        btn.classList.toggle('text-amber-500', on);
        btn.classList.toggle('text-slate-300', !on);
        var label = on ? (btn.dataset.labelOn || 'Remover dos favoritos')
                       : (btn.dataset.labelOff || 'Marcar como favorito');
        btn.setAttribute('aria-label', label);
        btn.setAttribute('title', label);
      })
      .catch(function() { /* falha silenciosa: usuário pode tentar de novo */ })
      .finally(function() {
        btn.disabled = false;
        if (window.scrollX !== sx || window.scrollY !== sy) {
          window.scrollTo(sx, sy);
        }
      });
  });
</script>
</body>
</html>
