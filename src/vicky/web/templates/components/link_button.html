{# Macro: link button — abre URL em nova aba ou mostra "Sem link" #}
{% macro link_button(url, label="Abrir Link", small=false) %}
  {% if url %}
    <a href="{{ url }}" target="_blank" rel="noopener noreferrer"
       class="inline-flex items-center gap-1.5 rounded-md
              {% if small %}px-2.5 py-1 text-xs{% else %}px-3 py-1.5 text-sm{% endif %}
              bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 hover:border-brand-300 hover:text-brand-700 transition font-medium shadow-sm">
      <svg xmlns="http://www.w3.org/2000/svg" class="{% if small %}h-3.5 w-3.5{% else %}h-4 w-4{% endif %}" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
      </svg>
      {{ label }}
    </a>
  {% else %}
    <span class="inline-flex items-center gap-1 text-xs text-slate-400 italic px-2 py-1">Sem link</span>
  {% endif %}
{% endmacro %}
